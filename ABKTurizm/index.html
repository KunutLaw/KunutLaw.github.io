<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABK Turizm - Ali Burak Kadan</title>
    <style>
        /* Elit VIP Taşımacılık Teması: Siyah & Altın */
        body {
            /* Logonun siyahıyla birebir uyumlu arka plan */
            background-color: #000000;
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 60px 20px;
            min-height: 100vh;
        }

        .logo {
            width: 220px;
            margin-bottom: 30px;
            /* Logonun altın ışıltısını vurgulayan hafif parıltı */
            filter: drop-shadow(0 0 10px rgba(213, 172, 99, 0.2));
        }

        .profile-section {
            text-align: center;
            margin-bottom: 45px;
        }

        .name {
            /* Elit duruş için Serif font ve Altın rengi */
            font-family: 'Times New Roman', Times, serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            color: #d5ac63;
        }

        .company-title {
            font-size: 14px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 400;
        }

        .container {
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* VIP hissi veren butonlar */
        .btn {
            background-color: transparent;
            color: #d5ac63;
            text-decoration: none;
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            border: 1px solid #d5ac63;
            transition: all 0.3s ease;
            letter-spacing: 0.8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Rehbere Ekle Butonu - Altın Dolgulu */
        .btn-primary {
            background-color: #d5ac63;
            color: #000000;
            border: none;
            font-weight: 700;
        }

        .btn:hover:not(.btn-primary) {
            background-color: rgba(213, 172, 99, 0.1);
            transform: translateY(-2px);
        }

        .btn-primary:hover {
            background-color: #e9c47e;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <img src="abk-logo.png" alt="ABK Turizm" class="logo">

    <div class="profile-section">
        <div class="name">Ali Burak Kadan</div>
        <div class="company-title">Genel Müdür</div>
    </div>

    <div class="container">
        <a href="abk-kadan.vcf" class="btn btn-primary">REHBERE EKLE</a>
        
        <a href="https://abkturizm.com/" class="btn" target="_blank">WEB SİTESİ</a>
        
        <a href="https://wa.me/905522257515" class="btn" target="_blank">WHATSAPP</a>
        
        <a href="mailto:aliburakkadan@abkturizm.com" class="btn">E-POSTA GÖNDER</a>
        
        <div onclick="alert('Ofisimiz şu anda hazırlık aşamasındadır.')" class="btn">KONUM</div>
    </div>

</body>
</html>
