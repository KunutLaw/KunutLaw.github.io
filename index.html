    <style>
        /* Premium Arka Plan: Derinlik katan mesh gradient (Koyu) */
        body {
            background: radial-gradient(circle at top left, #2c2c2c, #1a1a1a, #0f0f0f);
            background-attachment: fixed;
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

            flex-direction: column;

            margin: 0;

        }

        .logo {
            width: 130px;
            margin-bottom: 25px;

            text-align: center;
            margin-bottom: 45px;
        }

            font-weight: 600;

            letter-spacing: 0.5px;

        }

        .title {
            font-size: 13px;

            gap: 18px;

        .btn {
            background: linear-gradient(145deg, #e6e6e6, #c4c4c4);
            color: #1a1a1a; /* Açık zemin üzerinde net okunması için koyu metin */

            text-align: center;
            font-size: 15px;
            font-weight: 700;
            /* 3D Etkisi: Koyu zemine düşen belirgin gölgeler */
            box-shadow: 5px 5px 15px rgba(0,0,0,0.6), -2px -2px 8px rgba(255,255,255,0.1);
            border: 1px solid #b0b0b0;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 1px;
        }

        .btn:active {
            box-shadow: inset 4px 4px 10px rgba(0,0,0,0.2), inset -4px -4px 10px rgba(255,255,255,0.7);
            transform: translateY(2px);
        }
    </style>
</head>
